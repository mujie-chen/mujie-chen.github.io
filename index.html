<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Levi Chen</title>
  <meta name="description" content="a personal website" />
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1 id="siteTitle">Levi's Assorted Trackers</h1>
        <p class="subtitle" id="siteSubtitle"></p>
      </div>
      <div class="pillrow" id="pillrow"></div>
    </header>

    <section class="dashboard-layout" aria-label="Trackers Dashboard">
      <section class="left-column" aria-label="Left Column Widgets">
        <article class="photo-week-card" aria-label="Picture of the Week">
          <header class="photo-week-header">
            <h2 class="photo-week-title">Picture of the Week</h2>
          </header>
          <div class="photo-week-content">
            <a
              class="photo-week-link"
              id="weeklyPhotoLink"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                class="photo-week-image"
                id="weeklyPhotoImage"
                alt="Weekly photo"
                loading="eager"
                fetchpriority="high"
              />
              <span class="photo-week-meta" aria-label="Camera settings">
                <span class="photo-week-meta-item" id="weeklyPhotoFocal">35mm</span>
                <span class="photo-week-meta-item" id="weeklyPhotoExposure">f/2.8</span>
                <span class="photo-week-meta-item" id="weeklyPhotoShutter">1/250s</span>
              </span>
            </a>
          </div>
        </article>

        <section class="visited-places-section" aria-label="Visited Places Map">
          <!-- VisitedPlaces.com code -->
          <script>
          // VisitedPlaces.com code
          var visitedplaces_config = {
            "map": "world",
            "projection": "geoEquirectangular",
            "theme": "dark-blue",
            "water": 1,
            "graticule": 0,
            "names": 1,
            "duration": 2000,
            "slider": 0,
            "autoplay": 0,
            "autozoom": "none",
            "data": [
              {
                "colors": {},
                "places": [
                  "AT",
                  "BE",
                  "AD",
                  "CZ",
                  "DK",
                  "FR",
                  "DE",
                  "GR",
                  "HU",
                  "IS",
                  "IE",
                  "IM",
                  "IT",
                  "LI",
                  "MT",
                  "MC",
                  "NL",
                  "NO",
                  "PL",
                  "PT",
                  "SM",
                  "ES",
                  "SE",
                  "CH",
                  "TR",
                  "VA",
                  "MA",
                  "BH",
                  "CN",
                  "HK",
                  "JP",
                  "MY",
                  "NP",
                  "SG",
                  "KR",
                  "TH",
                  "AU",
                  "PH",
                  "ID",
                  "LU",
                  "SK",
                  "GB"
                ]
              }
            ],
            "home": "SG"
          };
          </script>
          <div id="chartdiv"></div>
          <script src="https://www.visitedplaces.com/js/common.js"></script>
          <script src="https://www.visitedplaces.com/js/viewer.js"></script>
          <!-- end: VisitedPlaces.com code -->
        </section>

        <section class="grid extras-grid" id="extra-grid"></section>
      </section>

      <section class="grid feed-grid" id="grid"></section>
    </section>
  </div>

  <div id="embed-container"></div>
  
  <footer>
    a work in progress
  </footer>

  <script src="/tracker-feeds.js" type="module"></script>
  <script src="/site-cards.js" type="module"></script>
</body>
</html>
